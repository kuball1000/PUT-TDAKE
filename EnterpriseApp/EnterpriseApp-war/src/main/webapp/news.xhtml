<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">

<h:head>
<title>News</title>
</h:head>
<h:body>
    <h:form>
        <h:panelGrid columns="2">
            <h:outputText value="Heading:"/>
            <h:inputText id="headingInputText"
                         value="#{newsBean.headingText}"/>

            <h:outputText value="Body:"/>
            <h:inputText id="bodyInputText"
                         value="#{newsBean.bodyText}"/>

            <h:outputText value=""/>
            <h:commandButton id="submitButton"
                             value="Submit"
                             action="#{newsBean.submitNews()}"/>
        </h:panelGrid>

        <h:dataTable value="#{newsBean.newsItems}" var="item"
                     border="1">
        <h:column>
        <f:facet name="header">
            <h:outputText value="Id"/>
        </f:facet>
        <h:outputText value="#{item.id}"/>
        </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Heading"/>
                </f:facet>
                <h:outputText value="#{item.heading}"/>
            </h:column>
            <h:column>
                <f:facet name="header">
                    <h:outputText value="Body"/>
                </f:facet>
                <h:outputText value="#{item.body}"/>
            </h:column>
        </h:dataTable>

    </h:form>
</h:body>

</html>
